<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dochaki Premium Grid Shop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shop.css">
    <link rel="stylesheet" href="../header.css">
    <link rel="stylesheet" href="../footer.css">




    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Shop.js"></script>
    <script src="../Header/header.js"></script>


</head>

<body>
    <div id="global-header"></div>
    <section class="dochaki-shop-wrapper">
        <div class="dochaki-shop-header">
            <h1 class="dochaki-shop-title" id="main-shop-title">Premium Biking Gear</h1>
            <p class="dochaki-shop-subtitle" id="product-count">Loading premium categories...</p>
        </div>

        <div class="dochaki-category-bar" id="category-tabs-container"></div>

        <div id="loading-state">Syncing live categories from database...</div>

        <div class="dochaki-grid-2col" id="product-grid"></div>
    </section>

    <!-- Footer sectio here  -->

    <div id="global-footer"></div>

    <script>
        async function loadHeader() {

            try {

                // Header Load
                const response = await fetch("../Header/header.html");
                const data = await response.text();

                document.getElementById("global-header").innerHTML = data;

                // Header inject hone do
                await new Promise(resolve => setTimeout(resolve, 100));

                // Supabase Auth Initialize
                if (typeof initSupabase === "function") {
                    await initSupabase();
                }

                // Cart Sync
                if (typeof forceSyncHomeCart === "function") {
                    forceSyncHomeCart();
                }

                // ==========================
                // ACTIVE MENU
                // ==========================

                let currentPage = window.location.pathname
                    .split("/")
                    .pop()
                    .toLowerCase();

                if (currentPage === "") {
                    currentPage = "index.html";
                }

                const menuItems = document.querySelectorAll(".hm-head-moto-nav-list li");

                menuItems.forEach(li => li.classList.remove("active-li"));

                menuItems.forEach(li => {

                    const link = li.querySelector("a");

                    if (!link) return;

                    const fileName = link
                        .getAttribute("href")
                        .split("/")
                        .pop()
                        .toLowerCase();

                    if (fileName === currentPage) {
                        li.classList.add("active-li");
                    }

                });

            }
            catch (err) {

                console.error("Header Load Error:", err);

            }

        }

        async function loadFooter() {

            try {

                const response = await fetch("../Footer/footer.html");

                const data = await response.text();

                document.getElementById("global-footer").innerHTML = data;

            }
            catch (err) {

                console.error("Footer Load Error:", err);

            }

        }

        document.addEventListener("DOMContentLoaded", async () => {

            await loadHeader();

            await loadFooter();

        });
    </script>
</body>

</html>
