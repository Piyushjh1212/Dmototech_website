<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products List - Dochaki Premium Gear</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./Products.css ">
    <link rel="stylesheet" href="../footer.css">
    <link rel="stylesheet" href="../header.css">



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="../Header/header.js"></script>
    <script src="./products.js"></script>


</head>

<body>
    <div id="global-header"></div>

    <!-- 2. SIDEBAR OVERLAY LAYER & DRAWER -->
    <div class="cart-drawer-overlay" id="cartOverlay" onclick="toggleCartDrawer()"></div>
    <div class="cart-drawer-panel" id="cartDrawer">
        <div class="cart-drawer-header">
            <h3>Your Shopping Cart</h3>
            <button class="cart-drawer-close" onclick="toggleCartDrawer()">✕</button>
        </div>
        <div class="cart-drawer-content" id="cartDrawerContainer">
            <!-- Items Render Automatically -->
        </div>
        <div class="cart-drawer-footer">
            <div class="cart-total-bar">
                <span>Total Amount:</span>
                <span id="cartDrawerTotal">₹0</span>
            </div>
            <button class="checkout-whatsapp-btn" onclick="triggerCheckout()">Order via WhatsApp</button>
        </div>
    </div>

    <!-- 3. SHOPPING GRID CONTENT -->
    <section class="dochaki-shop-wrapper">
        <div class="dochaki-category-bar">
            <button class="btn-back" onclick="window.location.href='../Shop/Shop.html'">⬅️ Back to Models</button>
        </div>

        <div class="dochaki-shop-header">
            <h1 class="dochaki-shop-title" id="main-model-title">Premium Products</h1>
            <p class="dochaki-shop-subtitle" id="product-count">Fetching model catalog...</p>
        </div>

        <div id="loading-state">Loading model specification setups...</div>
        <div id="error-state" style="display: none;">No products configurations tracked for this model.</div>

        <div class="dochaki-grid-2col" id="product-grid"></div>
    </section>

    <!-- Footer sectio here  -->

    <div id="global-footer"></div>

    <script>
        async function loadHeader() {

            try {

                // Header Load
                const response = await fetch("../Header/header.html");
                const data = await response.text();

                document.getElementById("global-header").innerHTML = data;

                // Header inject hone do
                await new Promise(resolve => setTimeout(resolve, 100));

                // Supabase Auth Initialize
                if (typeof initSupabase === "function") {
                    await initSupabase();
                }

                // Cart Sync
                if (typeof forceSyncHomeCart === "function") {
                    forceSyncHomeCart();
                }

                // ==========================
                // ACTIVE MENU
                // ==========================

                let currentPage = window.location.pathname
                    .split("/")
                    .pop()
                    .toLowerCase();

                if (currentPage === "") {
                    currentPage = "index.html";
                }

                if (currentPage === "products.html" || currentPage === "product_deatail.html") {
                    currentPage = "shop.html";
                }

                const menuItems = document.querySelectorAll(".hm-head-moto-nav-list li");

                menuItems.forEach(li => li.classList.remove("active-li"));

                menuItems.forEach(li => {

                    const link = li.querySelector("a");

                    if (!link) return;

                    const fileName = link
                        .getAttribute("href")
                        .split("/")
                        .pop()
                        .toLowerCase();

                    if (fileName === currentPage) {
                        li.classList.add("active-li");
                    }

                });

            }
            catch (err) {

                console.error("Header Load Error:", err);

            }

        }

        async function loadFooter() {

            try {

                const response = await fetch("../Footer/footer.html");

                const data = await response.text();

                document.getElementById("global-footer").innerHTML = data;

            }
            catch (err) {

                console.error("Footer Load Error:", err);

            }

        }

        document.addEventListener("DOMContentLoaded", async () => {

            await loadHeader();

            await loadFooter();

        });
    </script>
</body>

</html>
