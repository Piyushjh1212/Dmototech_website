<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./xpulse210.css">
    <title>Document</title>
</head>
<body>
    <section class="xp-shop-container">
  <!-- Top Bar: Title & Filter -->
  <div class="xp-shop-header">
    <div class="xp-title-area">
      <h1 class="xp-main-title">XPulse 210</h1>
      <p class="xp-result-count">Showing all 2 results</p>
    </div>
    
    <div class="xp-filter-wrapper">
      <select class="xp-sort-select">
        <option value="popularity">Sort by popularity</option>
        <option value="rating">Sort by average rating</option>
        <option value="latest">Sort by latest</option>
        <option value="price-low">Sort by price: low to high</option>
        <option value="price-high" selected>Sort by price: high to low</option>
      </select>
    </div>
  </div>

  <!-- Product Grid -->
  <div class="xp-product-grid">
    
    <!-- Product Card 1 -->
    <div class="xp-product-card">
      <div class="xp-image-wrapper">
        <span class="xp-badge-sale">Best Seller</span>
        <img src="https://dmototech.co.in/wp-content/uploads/2026/03/xpsws-11.webp" alt="Tall Touring Windshield" class="xp-product-img">
      </div>
      <div class="xp-card-details">
        <div class="xp-rating">
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star"></i>
          <span class="xp-rating-count">(3)</span>
        </div>
        <h3 class="xp-product-title">Tall Touring Windshield for Hero XPulse 210 – 2 Size Options</h3>
        <p class="xp-product-price">₹1,950 – ₹2,150 <span class="xp-tax-label">(incl. Tax)</span></p>
        <button class="xp-btn-action">Select Options</button>
      </div>
    </div>

    <!-- Product Card 2 -->
    <div class="xp-product-card">
      <div class="xp-image-wrapper">
        <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?auto=format&fit=crop&w=600&q=80" alt="Universal Premium Swingarm Spools" class="xp-product-img">
      </div>
      <div class="xp-card-details">
        <div class="xp-rating">
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <i class="fa-solid fa-star text-orange"></i>
          <span class="xp-rating-count">(12)</span>
        </div>
        <h3 class="xp-product-title">Dochaki Designs Universal Premium Swingarm Spools – M6, M8 & M10</h3>
        <p class="xp-product-price">₹349 <span class="xp-tax-label">(incl. Tax)</span></p>
        <button class="xp-btn-action">Select Options</button>
      </div>
    </div>

  </div>
</section>
    
</body>
</html>
